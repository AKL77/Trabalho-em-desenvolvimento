<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Bloquinhos — Login</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- ══════════════════════════════════
       ESQUERDA: hero
       ══════════════════════════════════ -->
  <div class="login-hero">

    <div class="hero-blocks">
      <div class="blk blk-1"></div>
      <div class="blk blk-2"></div>
      <div class="blk blk-3"></div>
      <div class="blk blk-4"></div>
      <div class="blk blk-5"></div>
      <div class="blk blk-6"></div>
      <div class="blk blk-7"></div>
    </div>

    <!-- Substitua o src pelo caminho da sua ilustração -->
    <div class="hero-image-slot">
      <img src="assets/168cec58-d122-498d-a4c8-0ae067a3d741.png" alt="">
    </div>

    <div class="hero-gradient"></div>

    <div class="hero-content">
      <div class="hero-eyebrow">
        BLOQUINHOS<span class="cursor"></span>
      </div>
      <h1 class="hero-title">
        Aprenda a programar<br>
        <span class="highlight">brincando.</span>
      </h1>
      <p class="hero-desc">
        Use blocos visuais para guiar seu personagem até o objetivo e descubra a lógica da programação de um jeito divertido.
      </p>
    </div>
  </div>


  <!-- ══════════════════════════════════
       DIREITA: formulário
       ══════════════════════════════════ -->
  <div class="login-panel">
    <div class="login-card">

      <h2 class="login-heading">Bem-vindo de volta</h2>
      <p class="login-sub">Entre com sua conta para continuar jogando</p>

      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input class="form-input" id="email" type="email"
               placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <input class="form-input" id="senha" type="password"
               placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-entrar" onclick="handleLogin()">
        Entrar
      </button>

      <div class="divider"><span>ou</span></div>

      <button class="btn-google" onclick="handleLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar com Google
      </button>

      <div class="login-footer">
        <a href="#">Esqueci minha senha</a>
        <a class="link-cadastro" href="#">Criar conta</a>
      </div>

    </div>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      if (email === 'professor' && senha === 'professor') {
        window.location.href = 'teacher.html';
      } else {
        window.location.href = 'game.html';
      }
    }

    /* Enter também aciona o login */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
